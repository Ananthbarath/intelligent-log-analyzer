server:
  port: 8083

spring:
  application:
    name: analyzer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/log_analyzer
    username: log_user
    password: log_pass
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.anant.loganalyzer.common.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.anant.loganalyzer.common.model.ProcessedLogEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

analyzer:
  error-rate:
    threshold: 5
    window: PT5M
